# Default v1 conductor manifest — the shipped bundle.
#
# This is a scaffold / template, not implicit reducer state (Task 20,
# §15.4). A real run still requires exactly one declared
# `is_orchestrator: true` role; the manifest parser enforces this
# (Phase 1 manifest checks, §13). Users copy this file and customize
# the worker names, model lists, visit caps, and tools to fit their
# workflow.
#
# The bundle is intentionally minimal — one orchestrator + one
# worker. Multi-worker workflows extend the `roles:` list. The
# reducer doesn't have any implicit knowledge of "default" roles;
# every role must be declared here.
#
# This file is consumed by `src/host/defaults.ts`, which exposes it
# as a string via `getDefaultConductorYaml()`. The Task 20 test
# suite (`tests/host/defaults.test.ts`) loads the bundle, runs the
# Phase 1 manifest checks, and exercises a linear + remediation
# E2E run via the stub provider.

version: 1
roles:
  - name: orchestrator
    is_orchestrator: true
    system_prompt: .pi/roles/orchestrator.md
    tools: [handoff, end]

  - name: worker
    max_visits: 3
    system_prompt: .pi/roles/worker.md
    tools: [handoff, end]
