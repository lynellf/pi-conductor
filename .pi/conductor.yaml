# pi-conductor manifest — spec §8 example.
#
# Source of truth for the orchestrator FSM in this repo. The host
# driver reads this file at run-start, validates it (Phase 1 Task 4),
# derives a pinned MachineDefinition (Phase 1 Task 4), and the pure
# FSM core consumes that definition as `def`.
#
# This file mirrors the §8 example in the spec verbatim. Validation
# and tests assert against this fixture; edit both together.
#
version: 1
roles:
  - name: orchestrator
    is_orchestrator: true
    models: [opencode-go:minimax-m3]
    max_run_cost_usd: 25.0
    system_prompt: .pi/roles/orchestrator.md
    tools: [handoff, end]

  - name: planner
    max_visits: 10
    models: [opencode-go:glm-5.2]
    system_prompt: .pi/roles/planner.md
    tools: [read, edit, write, bash, handoff, end, ask_user]

  - name: implementer
    max_visits: 10
    models: [opencode-go:minimax-m3]
    system_prompt: .pi/roles/implementer.md
    tools: [read, edit, write, bash, handoff, end]

  - name: reviewer
    max_visits: 10
    models: [opencode-go:glm-5.2]
    system_prompt: .pi/roles/reviewer.md
    tools: [read, grep, handoff, end]
