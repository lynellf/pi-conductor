# Live conductor manifest for pi-conductor.
# Keep this file aligned with docs/role-panel-review-flow-spec.md and
# docs/role-panel-review-flow-plan.md.
version: 2
roles:
  - name: orchestrator
    is_orchestrator: true
    models: [openai-codex:gpt-5.4-mini, opencode-go:minimax-m3]
    max_run_cost_usd: 25.0
    system_prompt: roles/orchestrator.md
    tools: [handoff, end, ask_user]

  - name: planner
    max_visits: 10
    models: [openai-codex:gpt-5.5, opencode-go:glm-5.2]
    system_prompt: roles/planner.md
    tools: [read, edit, write, bash, handoff, end, ask_user]

  - name: assistant
    max_visits: 10
    models: [openai-codex:gpt-5.4-mini, opencode-go:minimax-m3]
    system_prompt: roles/assistant.md
    tools: [read, grep, ask_user, handoff, end]

  - name: plan-reviewer-a
    max_visits: 10
    models: [openai-codex:gpt-5.4-mini, opencode-go:minimax-m3]
    system_prompt: roles/plan-reviewer-a.md
    tools: [read, grep, handoff, end]

  - name: plan-reviewer-b
    max_visits: 10
    models: [openai-codex:gpt-5.4-mini, opencode-go:minimax-m3]
    system_prompt: roles/plan-reviewer-b.md
    tools: [read, grep, handoff, end]

  - name: implementer
    max_visits: 10
    models: [openai-codex:gpt-5.4-mini, opencode-go:minimax-m3]
    system_prompt: roles/implementer.md
    tools: [read, edit, write, bash, handoff, end]

  - name: reviewer
    max_visits: 10
    models: [openai-codex:gpt-5.4-mini, opencode-go:minimax-m3]
    system_prompt: roles/reviewer.md
    tools: [read, grep, handoff, end]
